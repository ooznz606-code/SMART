services:
  - type: web
    name: smarttrader-license
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn license_server.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_TOKEN
        value: Aa123123Aa
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: licenses.db
      - key: EXE_DOWNLOAD_URL
        value: https://github.com/ooznz606-code/SMART/releases/download/v1.7.0/SmartTrader.exe
    plan: free
